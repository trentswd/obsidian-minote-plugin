name: Release Obsidian Minote Plugin

on:
  push:
    tags:
      - "*"

env:
  PLUGIN_NAME: minote-sync

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Build
        id: build
        run: |
          pnpm install
          pnpm run build
          mkdir ${{ env.PLUGIN_NAME }}
          cp ./main.js ./manifest.json ${{ env.PLUGIN_NAME }}
          zip -r ${{ env.PLUGIN_NAME }}.zip ${{ env.PLUGIN_NAME }}
          
          # Use GITHUB_REF to get the tag name
          TAG_NAME=${GITHUB_REF#refs/tags/}
          ZIP_NAME=${{ env.PLUGIN_NAME }}-${TAG_NAME}.zip
          mv ${{ env.PLUGIN_NAME }}.zip $ZIP_NAME
          
          # Modern way to set outputs
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.build.outputs.zip_name }}
            main.js
            manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}